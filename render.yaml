services:
  - type: web
    name: ipl-auction-app
    env: node
    # NODE_ENV=development during install so devDeps (vite, etc.) are included
    buildCommand: >
      npm install --prefix backend &&
      NODE_ENV=development npm install --prefix frontend &&
      npm run build --prefix frontend
    # At runtime, Node.js serves the compiled React app + API
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
